<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
                  url('https://pbs.twimg.com/media/GPCn-RTbEAAmxSe.jpg') center / cover no-repeat fixed;
      color: #eee;
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .turn {
      margin-bottom: 1.25rem;
      font-size: 1.1rem;
      opacity: 0.9;
    }
    .turn span {
      font-weight: 600;
    }
    .turn .x { color: #e94560; }
    .turn .o { color: #0fceb8; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      width: min(320px, 90vw);
      aspect-ratio: 1;
      background: #0f3460;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .cell {
      background: #16213e;
      border: none;
      border-radius: 8px;
      font-size: 2.5rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      color: inherit;
    }
    .cell:hover:not(.taken) {
      background: #1f4068;
      transform: scale(1.02);
    }
    .cell.taken {
      cursor: default;
    }
    .cell.x { color: #e94560; }
    .cell.o { color: #0fceb8; }
    .cell.winner {
      background: rgba(15, 206, 184, 0.25);
      box-shadow: inset 0 0 20px rgba(15, 206, 184, 0.3);
    }
    .message {
      margin-top: 1.25rem;
      min-height: 2rem;
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
    }
    .message.win { color: #0fceb8; }
    .message.draw { color: #f39c12; }
    button.reset {
      margin-top: 1rem;
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button.reset:hover {
      background: #ff6b6b;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <p class="turn">Turn: <span class="x" id="turnLabel">X</span></p>
  <div class="board" id="board">
    <button type="button" class="cell" data-i="0" aria-label="Cell 1"></button>
    <button type="button" class="cell" data-i="1" aria-label="Cell 2"></button>
    <button type="button" class="cell" data-i="2" aria-label="Cell 3"></button>
    <button type="button" class="cell" data-i="3" aria-label="Cell 4"></button>
    <button type="button" class="cell" data-i="4" aria-label="Cell 5"></button>
    <button type="button" class="cell" data-i="5" aria-label="Cell 6"></button>
    <button type="button" class="cell" data-i="6" aria-label="Cell 7"></button>
    <button type="button" class="cell" data-i="7" aria-label="Cell 8"></button>
    <button type="button" class="cell" data-i="8" aria-label="Cell 9"></button>
  </div>
  <p class="message" id="message"></p>
  <button type="button" class="reset" id="reset">New game</button>

  <script>
    const WIN_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameOver = false;
    let winnerCells = null;

    const boardEl = document.getElementById('board');
    const turnLabel = document.getElementById('turnLabel');
    const messageEl = document.getElementById('message');
    const resetBtn = document.getElementById('reset');

    function checkWinner() {
      for (const [a, b, c] of WIN_LINES) {
        if (board[a] && board[a] === board[b] && board[b] === board[c]) {
          winnerCells = [a, b, c];
          return board[a];
        }
      }
      return null;
    }

    function isDraw() {
      return board.every(cell => cell !== '');
    }

    function updateUI() {
      const cells = boardEl.querySelectorAll('.cell');
      cells.forEach((cell, i) => {
        cell.textContent = board[i];
        cell.classList.toggle('taken', !!board[i]);
        cell.classList.remove('x', 'o', 'winner');
        if (board[i]) {
          cell.classList.add(board[i].toLowerCase());
          if (winnerCells && winnerCells.includes(i)) cell.classList.add('winner');
        }
      });
      turnLabel.textContent = currentPlayer;
      turnLabel.className = currentPlayer.toLowerCase();
    }

    function showResult(win) {
      gameOver = true;
      if (win) {
        messageEl.textContent = `${win} wins!`;
        messageEl.className = 'message win';
      } else {
        messageEl.textContent = "It's a draw!";
        messageEl.className = 'message draw';
      }
    }

    function play(cellIndex) {
      if (gameOver || board[cellIndex]) return;
      board[cellIndex] = currentPlayer;
      const win = checkWinner();
      if (win) {
        updateUI();
        showResult(win);
        return;
      }
      if (isDraw()) {
        updateUI();
        showResult(null);
        return;
      }
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateUI();
    }

    function reset() {
      board = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = 'X';
      gameOver = false;
      winnerCells = null;
      messageEl.textContent = '';
      messageEl.className = 'message';
      updateUI();
    }

    boardEl.addEventListener('click', (e) => {
      const cell = e.target.closest('.cell');
      if (cell) play(Number(cell.dataset.i));
    });
    resetBtn.addEventListener('click', reset);

    updateUI();
  </script>
</body>
</html>
